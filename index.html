<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OYP – Find Local Services</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:Inter,sans-serif;margin:0;background:#0e0e10;color:#fff}
h1,h2,h3{font-family:"Space Grotesk",sans-serif}

.nav{display:flex;justify-content:space-between;padding:16px 40px;background:#111;position:fixed;width:100%;top:0}
.nav button{background:#ff6a3d;border:none;color:#fff;padding:10px 16px;border-radius:8px}

.hero{padding-top:120px;text-align:center;padding-bottom:80px}
.hero h1{font-size:60px;margin-bottom:10px}
.hero p{color:#aaa}

.search-box{display:flex;justify-content:center;margin-top:30px;gap:10px}
.search-box input{padding:16px;border-radius:10px;border:none;width:250px}
.search-box button{padding:16px 24px;border:none;background:#ff6a3d;color:#fff;border-radius:10px}

.section{padding:60px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}

.card{background:#18181b;padding:20px;border-radius:14px;cursor:pointer}
.card:hover{transform:translateY(-5px)}

.listing{background:#18181b;padding:20px;border-radius:14px}
.rating{color:gold}

</style>
</head>

<body>

<div class="nav">
  <div>OYP</div>
  <div>
    <button>List Business</button>
  </div>
</div>

<section class="hero">
  <h1>Find Trusted Local Services</h1>
  <p>Search, compare and connect instantly</p>

  <div class="search-box">
    <input id="service" placeholder="What service?">
    <input id="location" placeholder="Location">
    <button onclick="search()">Search</button>
  </div>
</section>

<section class="section">
  <h2>Popular Categories</h2>
  <div class="grid">
    <div class="card" onclick="quick('Plumber')">Plumber</div>
    <div class="card" onclick="quick('Electrician')">Electrician</div>
    <div class="card" onclick="quick('Salon')">Salon</div>
    <div class="card" onclick="quick('Restaurant')">Restaurant</div>
  </div>
</section>

<section class="section">
  <h2>Top Listings</h2>
  <div id="results" class="grid"></div>
</section>

<script>
const data=[
{name:"Sharma Electrician",rating:4.6,category:"Electrician",location:"Mohali"},
{name:"Royal Salon",rating:4.4,category:"Salon",location:"Chandigarh"},
{name:"Quick Plumber",rating:4.8,category:"Plumber",location:"Mohali"}
];

function render(list){
  const box=document.getElementById('results');
  box.innerHTML="";
  list.forEach(item=>{
    box.innerHTML+=`<div class="listing">
      <h3>${item.name}</h3>
      <div class="rating">⭐ ${item.rating}</div>
      <p>${item.category} • ${item.location}</p>
      <button onclick="alert('Call ${item.name}')">Call</button>
    </div>`
  })
}

function search(){
  const s=document.getElementById('service').value.toLowerCase();
  const l=document.getElementById('location').value.toLowerCase();

  const filtered=data.filter(d=>
    d.category.toLowerCase().includes(s) && d.location.toLowerCase().includes(l)
  );

  render(filtered.length?filtered:data);
}

function quick(cat){
  document.getElementById('service').value=cat;
  search();
}

render(data);
</script>

</body>
</html>
